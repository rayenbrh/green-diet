# Déploiement Netlify — application Vite dans green-diet-frontend
# Dans l’UI Netlify : pas besoin de « Base directory » si ce fichier est à la racine du dépôt.

[build]
  base = "green-diet-frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Dépendances : `green-diet-frontend/.npmrc` (legacy-peer-deps) est pris en compte lors du `npm install`.

# Application React (React Router) : toutes les routes → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# En-têtes utiles (PWA, assets)
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
