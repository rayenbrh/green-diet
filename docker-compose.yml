services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: greendiet

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/greendiet
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost
      ADMIN_URL: http://localhost
      TRUST_PROXY: "1"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_BACKEND_ORIGIN: http://localhost:5000
        VITE_ADMIN_URL: http://localhost/admin/
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mongo_data:
